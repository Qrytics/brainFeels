<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BrainFeels</title>
    <style>
      body {
        font: 13px system-ui, sans-serif;
        margin: 12px;
        min-width: 280px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      input[type="url"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
      }
      p {
        margin: 10px 0 0;
        font-size: 12px;
        color: #444;
      }
      button {
        margin-top: 10px;
        padding: 6px 12px;
      }
    </style>
  </head>
  <body>
    <label for="serverUrl">Local BrainFeels server</label>
    <input id="serverUrl" type="url" placeholder="http://127.0.0.1:8765" />
    <button id="save" type="button">Save</button>
    <p id="status"></p>
    <p>
      Run the Python server from this repo, then open a video page and use the floating
      <strong>BrainFeels</strong> button.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
