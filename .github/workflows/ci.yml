name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  python-checks:
    name: Python lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy pytest anyio httpx

      - name: Ruff lint
        run: ruff check .

      - name: mypy type check
        run: mypy main.py --ignore-missing-imports

      - name: pytest (demo mode — no TRIBE v2)
        run: pytest tests/ -v
